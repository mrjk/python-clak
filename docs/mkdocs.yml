---
site_name: Clak
site_description: Class-based Python CLIs on top of argparse
site_url: https://mrjk.github.io/python-clak/
repo_url: https://github.com/mrjk/python-clak
repo_name: mrjk/python-clak

docs_dir: content/

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - navigation.tabs
    - content.code.annotate

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: red
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - abbr
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
      auto_title: false

  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - ".."
        - "../logo"
        - "content"
      auto_append:
        - docs/includes/abbreviations.md
      check_paths: true

  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - footnotes
  - attr_list
  - sane_lists
  - toc

  - mdx_truly_sane_lists:
      nested_indent: 2
      truly_sane: true


plugins:
  - search
  - awesome-pages
  - mkdocs-simple-hooks:
      hooks:
        on_post_build: "docs.hooks:copy_get"
  - autorefs
  - mkdocstrings:
      handlers:
        python:
          paths: [..]
          options:
            show_source: true
            show_root_heading: true

# MkDocs validates nav before awesome-pages expands `... | dir/*`.
# Ignore those false positives; real missing pages still fail --strict later.
validation:
  nav:
    omitted_files: ignore
    not_found: ignore
    absolute_links: ignore

nav:
  - Home: index.md
  - ... | quickstart/*
  - ... | guides/*
  - ... | docs/*

  - Reference:
      - ... | api/*
      - AI:
          - Primer: ai/primer.md
          - Reference: ai/reference.md
      - Architecture:
          - Overview: architecture/list.md
          - ... | architecture/*

  - About:
      - Contributing: project/CONTRIBUTING.md
      - Development setup: project/setup.md
      - Roadmap: project/roadmap.md
      - Release: project/release.md
      - Code of Conduct: project/CODE_OF_CONDUCT.md
      - License: project/license.md
